  <line x1="20" y1="62" x2="12" y2="60" stroke="#0D0D0D" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="80" y1="62" x2="88" y2="60" stroke="#0D0D0D" stroke-width="2.8" stroke-linecap="round"/>
  <rect x="20" y="54" width="26" height="3.5" rx="2" fill="#D4AF37"/>
  <rect x="54" y="54" width="26" height="3.5" rx="2" fill="#D4AF37"/>


<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110">
  <!-- Ears -->
  <ellipse cx="18" cy="66" rx="8" ry="9" fill="#F5CBA7"/>
  <ellipse cx="18" cy="66" rx="5" ry="5.5" fill="#EDB894"/>
  <ellipse cx="82" cy="66" rx="8" ry="9" fill="#F5CBA7"/>
  <ellipse cx="82" cy="66" rx="5" ry="5.5" fill="#EDB894"/>

  <!-- Face -->
  <ellipse cx="50" cy="68" rx="32" ry="30" fill="#F5CBA7"/>

  <!-- Hair — back/sides coverage -->
  <path d="M 19 58 C 19 36, 30 20, 50 18 C 70 20, 81 36, 81 58 L 81 52 C 80 28, 66 14, 50 14 C 34 14, 20 28, 19 52 Z" fill="#0D0D0D"/>

  <!-- Hair — pompadour quiff -->
  <path d="
    M 28 54
    C 26 42, 28 28, 38 18
    C 43 10, 50 5, 55 7
    C 63 5, 72 13, 70 27
    C 74 18, 80 22, 76 36
    C 71 24, 62 18, 56 22
    C 50 28, 44 36, 36 44
    C 31 48, 28 52, 28 54 Z
  " fill="#111111"/>

  <!-- Gold hair highlight -->
  <path d="M 55 7 C 63 5, 72 12, 70 25 C 66 16, 59 10, 55 12 Z" fill="#D4AF37" opacity="0.85"/>
  <path d="M 70 25 C 76 20, 80 26, 76 36 C 74 28, 72 23, 70 27 Z" fill="#D4AF37" opacity="0.5"/>

  <!-- Beard shadow -->
  <ellipse cx="50" cy="94" rx="16" ry="7" fill="#8B6040" opacity="0.3"/>

  <!-- Glasses left lens -->
  <rect x="21" y="57" width="25" height="17" rx="4" fill="white" opacity="0.88"/>
  <!-- Glasses right lens -->
  <rect x="54" y="57" width="25" height="17" rx="4" fill="white" opacity="0.88"/>

  <!-- Glasses left frame -->
  <rect x="21" y="57" width="25" height="17" rx="4" fill="none" stroke="#0D0D0D" stroke-width="3"/>
  <!-- Glasses right frame -->
  <rect x="54" y="57" width="25" height="17" rx="4" fill="none" stroke="#0D0D0D" stroke-width="3"/>

  <!-- Bridge -->
  <line x1="46" y1="65" x2="54" y2="65" stroke="#0D0D0D" stroke-width="2.5"/>
  <!-- Arms -->
  <line x1="21" y1="65" x2="13" y2="63" stroke="#0D0D0D" stroke-width="2.5"/>
  <line x1="79" y1="65" x2="87" y2="63" stroke="#0D0D0D" stroke-width="2.5"/>

  <!-- Gold top bar on frames -->
  <rect x="21" y="57" width="25" height="3.5" rx="1" fill="#D4AF37"/>
  <rect x="54" y="57" width="25" height="3.5" rx="1" fill="#D4AF37"/>

  <!-- Eyebrows -->
  <path d="M 23 56 Q 33.5 51 44 56" stroke="#3D2B1F" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 56 56 Q 66.5 51 77 56" stroke="#3D2B1F" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <circle cx="33.5" cy="67" r="6.5" fill="#1A1A2E"/>
  <circle cx="66.5" cy="67" r="6.5" fill="#1A1A2E"/>
  <!-- White reflection -->
  <circle cx="30" cy="63.5" r="2.2" fill="white"/>
  <circle cx="63" cy="63.5" r="2.2" fill="white"/>
  <!-- Gold sparkle -->
  <circle cx="37" cy="70.5" r="1.4" fill="#D4AF37"/>
  <circle cx="70" cy="70.5" r="1.4" fill="#D4AF37"/>

  <!-- Nose -->
  <ellipse cx="50" cy="80" rx="3" ry="2.2" fill="#E0A880"/>

  <!-- Smile -->
  <path d="M 40 87 Q 50 94 60 87" stroke="#8B5E3C" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="24" cy="79" rx="7" ry="5" fill="#FFB3A7" opacity="0.32"/>
  <ellipse cx="76" cy="79" rx="7" ry="5" fill="#FFB3A7" opacity="0.32"/>
</svg>

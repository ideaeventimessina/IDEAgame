kind = "web"
previewPath = "/"
title = "IDEAgame"
version = "1.0.0"
id = "artifacts/ideagame"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19263

[services.development]
run = "pnpm --filter @workspace/ideagame run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ideagame", "run", "build" ]
publicDir = "artifacts/ideagame/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19263"
BASE_PATH = "/"
